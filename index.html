<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Leave Management Tool</title>
</head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    padding:40px 20px;
}

.container{
    max-width:1200px;
    margin:auto;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:25px;
    padding:35px;
    box-shadow:
    0 20px 50px rgba(0,0,0,.35),
    inset 0 1px 0 rgba(255,255,255,.15);
}

h1{
    text-align:center;
    color:#fff;
    font-size:2.5rem;
    font-weight:700;
    margin-bottom:30px;
    letter-spacing:1px;
}

.form-section{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
    margin-bottom:35px;
}

input,
select{
    width:100%;
    padding:15px 18px;
    border:none;
    outline:none;
    border-radius:14px;
    background:rgba(255,255,255,0.12);
    color:#fff;
    font-size:15px;
    border:1px solid rgba(255,255,255,.15);
    transition:.35s ease;
}

input::placeholder{
    color:#d1d5db;
}

input:focus,
select:focus{
    transform:translateY(-3px);
    border-color:#38bdf8;
    box-shadow:0 0 20px rgba(56,189,248,.4);
}

select option{
    color:#000;
}

.submit-btn{
    border:none;
    border-radius:14px;
    padding:15px;
    cursor:pointer;
    font-weight:600;
    color:#fff;
    font-size:15px;
    background:linear-gradient(135deg,#06b6d4,#2563eb);
    transition:.35s;
    box-shadow:0 10px 25px rgba(37,99,235,.35);
}

.submit-btn:hover{
    transform:translateY(-4px);
    box-shadow:0 15px 35px rgba(37,99,235,.5);
}

.dashboard-cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    padding:22px;
    border-radius:18px;
    color:#fff;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,.1);
    transition:.3s;
}

.card:hover{
    transform:translateY(-6px);
}

.card h2{
    font-size:28px;
    margin-top:8px;
}

.card1{
    background:linear-gradient(135deg,#3b82f6,#2563eb);
}

.card2{
    background:linear-gradient(135deg,#10b981,#059669);
}

.card3{
    background:linear-gradient(135deg,#f59e0b,#d97706);
}

.card4{
    background:linear-gradient(135deg,#ef4444,#dc2626);
}

.table-container{
    overflow-x:auto;
    border-radius:18px;
    background:rgba(255,255,255,0.05);
    padding:10px;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:linear-gradient(135deg,#2563eb,#06b6d4);
}

th{
    color:#fff;
    padding:18px;
    text-align:left;
    font-size:14px;
    text-transform:uppercase;
}

td{
    padding:18px;
    color:#e5e7eb;
    border-bottom:1px solid rgba(255,255,255,.08);
}

tbody tr{
    transition:.3s;
}

tbody tr:hover{
    background:rgba(255,255,255,.05);
}

.approve-btn{
    border:none;
    padding:10px 16px;
    border-radius:10px;
    color:#fff;
    cursor:pointer;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    margin-right:8px;
    transition:.3s;
}

.reject-btn{
    border:none;
    padding:10px 16px;
    border-radius:10px;
    color:#fff;
    cursor:pointer;
    background:linear-gradient(135deg,#ef4444,#dc2626);
    transition:.3s;
}

.approve-btn:hover,
.reject-btn:hover{
    transform:scale(1.05);
}

.status-approved{
    color:#22c55e;
    font-weight:700;
}

.status-rejected{
    color:#ef4444;
    font-weight:700;
}

.status-pending{
    color:#facc15;
    font-weight:700;
}

.search-box{
    width:100%;
    margin-bottom:20px;
}

.search-box input{
    width:100%;
}

.header-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    flex-wrap:wrap;
    gap:15px;
}

.header-bar .user{
    color:#fff;
    font-weight:500;
    background:rgba(255,255,255,.08);
    padding:12px 18px;
    border-radius:12px;
}

@media(max-width:768px){

    h1{
        font-size:1.8rem;
    }

    .container{
        padding:20px;
    }

    th,
    td{
        padding:12px;
        font-size:13px;
    }

    .approve-btn,
    .reject-btn{
        padding:8px 12px;
        font-size:12px;
    }
}
</style>
<body>
  <div id="root"></div>
  <script type="module" src="/src/index.jsx"></script>
</body>
</html>
